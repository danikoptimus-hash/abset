# Статика React (FRONTEND.md §6) — этот nginx НЕ делает роутинг /api или
# /legacy (это внешний nginx, docker/nginx.conf.template); тут только отдача
# собранных файлов + SPA-фолбэк для client-side роутинга (React Router).
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/html image/svg+xml;

    # Хэшированные ассеты (Vite добавляет content-hash в имя файла) можно
    # кэшировать надолго; index.html — никогда (иначе новый деплой не увидят
    # без принудительной перезагрузки).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri /index.html;
    }
}
