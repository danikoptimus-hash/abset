name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: abkit
          POSTGRES_PASSWORD: abkit
          POSTGRES_DB: abkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U abkit -d abkit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # tests/conftest.py: если задан TEST_DATABASE_URL, тесты используют его
      # вместо поднятия своего Postgres через testcontainers (см. DOCKER.md §12:
      # "testcontainers-postgres (или docker-compose для CI)").
      TEST_DATABASE_URL: postgresql+psycopg://abkit:abkit@localhost:5432/abkit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установить зависимости
        run: pip install -e ".[dev]"

      - name: Lint (pyflakes)
        run: python -m pyflakes abkit tests migrations app.py cli.py cli_admin.py

      - name: Тесты
        run: python -m pytest -q

  build-and-push:
    # Только на push тега вида v* (например v1.4.0) — DOCKER.md §12/§7.1.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Версия из тега (v1.4.0 -> 1.4.0)
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            ABKIT_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
