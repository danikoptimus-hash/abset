name: CI

# ВРЕМЕННО (до 2026-08-01): GitHub Actions квота исчерпана на этот
# биллинг-цикл, автозапуск все равно висит в очереди и отменяется без
# прогона. on: push убран, остался только ручной запуск (workflow_dispatch).
# Откатить этим же коммитом-ревертом 1 августа.
on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

# Отменяет предыдущий незавершенный прогон для той же ветки при новом push —
# без этого несколько быстрых коммитов подряд ставят в очередь несколько
# полных прогонов и жгут Actions-квоту на уже устаревшие ревизии.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: abkit
          POSTGRES_PASSWORD: abkit
          POSTGRES_DB: abkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U abkit -d abkit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # conftest.py (корень репозитория): если задан TEST_DATABASE_URL, тесты
      # используют его вместо поднятия своего Postgres через testcontainers
      # (см. DOCKER.md §12: "testcontainers-postgres (или docker-compose для CI)").
      # Общий и для tests/, и для backend/tests/ (FRONTEND.md R1+).
      TEST_DATABASE_URL: postgresql+psycopg://abkit:abkit@localhost:5432/abkit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установить зависимости
        run: pip install -e ".[dev]"

      - name: Lint (pyflakes)
        run: python -m pyflakes abkit backend tests migrations cli.py cli_admin.py conftest.py

      - name: Тесты (ядро + БД + backend)
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Типы (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Build
        run: npm run build

  docs-freshness:
    # Non-blocking напоминание (CLAUDE.md, «Правило: актуальность
    # документации»): если пуш/PR трогает функциональный код
    # (frontend/src, backend/, abkit/), а docs/ не тронуты и в сообщениях
    # коммитов нет маркера "[docs:none]" — warning-аннотация в Summary,
    # НЕ fail. Не заменяет ручной шаг "docs check" в конце каждого пакета
    # правок — просто подстраховка на случай, если его забыли.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docs freshness reminder
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          # Push на новую ветку / force-push: "before" может быть
          # all-zero или отсутствовать в истории раннера — тогда сравниваем
          # с непосредственным родителем HEAD, чтобы не упасть на diff.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            BASE="$(git rev-parse "$HEAD^" 2>/dev/null || echo "$HEAD")"
          fi

          CHANGED="$(git diff --name-only "$BASE" "$HEAD")"
          FUNCTIONAL="$(echo "$CHANGED" | grep -E '^(frontend/src/|backend/|abkit/)' || true)"
          DOCS_TOUCHED="$(echo "$CHANGED" | grep -E '^docs/' || true)"
          MARKER="$(git log "$BASE..$HEAD" --format=%B | grep -F '[docs:none]' || true)"

          if [ -n "$FUNCTIONAL" ] && [ -z "$DOCS_TOUCHED" ] && [ -z "$MARKER" ]; then
            echo "::warning::Functional changes without docs update — verify USER_GUIDE/OPERATIONS are still accurate"
          fi

  e2e:
    # Playwright против реального docker compose стека (FRONTEND.md §6) — на
    # PR и вручную (workflow_dispatch), не на каждый push: поднимает полный
    # стек (backend+frontend+postgres+nginx), это медленнее обычного
    # test/frontend прогона.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: [test, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Сгенерировать .env для docker compose
        run: |
          PG_PASSWORD=$(openssl rand -hex 16)
          cat > .env <<EOF
          ABKIT_SECRET_KEY=$(openssl rand -hex 32)
          POSTGRES_PASSWORD=$PG_PASSWORD
          ABKIT_ADMIN_EMAIL=admin@e2e.test
          ABKIT_ADMIN_PASSWORD=e2epass123
          ABKIT_ADMIN_NAME=E2E Admin
          EOF
          # Database Connections feature (DB4, CLAUDE.md): datasets-page.spec.ts
          # self-references this same postgres (reachable as "postgres" from
          # INSIDE the backend container, on the compose network) to exercise
          # the full connect -> preview -> create-dataset-from-SQL flow.
          echo "E2E_POSTGRES_PASSWORD=$PG_PASSWORD" >> "$GITHUB_ENV"

      - name: docker compose up -d --build --wait
        run: docker compose up -d --build --wait

      - name: Создать viewer-пользователя для тестов прав доступа
        run: |
          docker compose exec -T backend abkit-admin create-user \
            --email viewer@e2e.test --first-name "E2E Viewer" --role viewer --password e2epass123

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: Кэш браузеров Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Установить браузеры Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e (против docker compose на localhost:8080)
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:8080
          E2E_API_BASE: http://localhost:8080/api/v1
          # Database Connections feature (DB4): host="postgres" — resolvable
          # from INSIDE the backend container (compose network), not from
          # this runner; only the backend ever connects to it.
          E2E_POSTGRES_HOST: postgres
          E2E_POSTGRES_PORT: "5432"
          E2E_POSTGRES_USER: abkit
          E2E_POSTGRES_PASSWORD: ${{ env.E2E_POSTGRES_PASSWORD }}
          E2E_POSTGRES_DB: abkit
        run: npx playwright test

      - name: Логи контейнеров (при падении)
        if: failure()
        run: docker compose logs

      - name: Playwright report (при падении)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: docker compose down -v (уборка раннера)
        if: always()
        run: docker compose down -v

  persistence-test:
    # Опциональная джоба: docker/test_persistence.sh реально поднимает
    # docker compose (build + up/down/force-recreate), это медленно и не
    # нужно на каждый push/PR — запускается только вручную (Actions ->
    # CI -> Run workflow), например перед релизом или после правок
    # docker-compose.yml/entrypoint-*.sh/схемы БД. См. docker/README.md,
    # раздел "Данные и перезапуски".
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Сгенерировать .env для docker compose
        run: |
          cat > .env <<EOF
          ABKIT_SECRET_KEY=$(openssl rand -hex 32)
          POSTGRES_PASSWORD=$(openssl rand -hex 16)
          EOF

      - name: docker/test_persistence.sh
        run: bash docker/test_persistence.sh

      - name: Логи контейнеров (при падении)
        if: failure()
        run: docker compose logs

      - name: docker compose down -v (уборка раннера)
        if: always()
        run: docker compose down -v

  build-and-push:
    # Только на push тега вида v* (например v2.0.0) — DOCKER.md §12/§7.1.
    # Собирает оба образа (backend, frontend).
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Версия из тега (v1.4.0 -> 1.4.0)
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Образ backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            ABKIT_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}-backend:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}-backend:latest

      - name: Образ frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-frontend:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}-frontend:latest
